# Generic Docker Compose for TL-Verilog Conversion Projects
#
# To customize for the project (if needed):
# - Add your own Dockerfile.project if needed
# - Extend this file to add Dockerfile.project
#
# Usage:
# > docker compose up claude-conversion
# Or, for testing/shell access:
# > docker compose run claude-conversion bash
#
# See Dockerfile for details on the base image.

services:
  claude-conversion:
    build:
      context: .
      dockerfile: Dockerfile
    image: claude-code-env:latest
    volumes:
      - ../../..:/workspace/proj:rw  # Project root mounted as work directory
      # Add data directory if needed:
      # - ./workspace/data:/workspace/data:ro
    working_dir: /workspace/proj/tlv/project_instructions
    environment:
      - DISPLAY=${DISPLAY:-}
      - CLAUDE_CODE_OAUTH_TOKEN=${CLAUDE_CODE_OAUTH_TOKEN:-}
    # Security settings matching run_claude.sh
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    pids_limit: 100
    tmpfs:
      - /tmp:noexec,nosuid,size=100m
      #- /workspace/temp:noexec,nosuid,size=2g
    # Use bridge network for security (not host network)
    networks:
      - default
    extra_hosts:
      - "host.docker.internal:127.0.0.1"

networks:
  default: